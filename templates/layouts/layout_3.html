<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusGo</title>
    <link rel="icon" href="{{ url_for('static', filename='images/plusgo.png') }}" type="image/png">
    <!-- swet alert -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- cdn swet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- fuente Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- cargar la pagina nProgress -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">


    <!-- Custom stlylesheet -->
    <style>
        * {
            font-family: Montserrat, -apple-system, system-ui;
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
        }

        body {
            padding: 0;
            margin: 0;
        }

        #notfound {
            position: relative;
            height: 100vh;
        }

        #notfound .notfound-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('{{ url_for("static", filename="images/pattern.png") }}');
            background-size: cover;
        }

        #notfound .notfound-bg:after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0), rgba(4, 17, 43, 0.92)),
            url('{{ url_for("static", filename="images/pattern.png") }}');
            ;
        }

        #notfound .notfound {
            position: absolute;
            left: 50%;
            top: 50%;
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
        }

        .notfound {
            max-width: 910px;
            width: 100%;
            line-height: 1.4;
            text-align: center;
        }

        .notfound .notfound-404,
        .notfound .notfound-500 {
            position: relative;
            height: 200px;
        }

        .notfound .notfound-404 h1,
        .notfound .notfound-500 h1 {
            position: absolute;
            left: 50%;
            top: 50%;
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            font-size: 220px;
            font-weight: 900;
            margin: 0px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
        }

        .notfound h2 {
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        .notfound .home-btn,
        .notfound .contact-btn {
            display: inline-block;
            font-weight: 700;
            text-decoration: none;
            background-color: transparent;
            border: 2px solid transparent;
            text-transform: uppercase;
            padding: 13px 25px;
            font-size: 18px;
            border-radius: 40px;
            margin: 7px;
            -webkit-transition: 0.2s all;
            transition: 0.2s all;
        }

        .notfound .home-btn:hover,
        .notfound .contact-btn:hover {
            opacity: 0.9;
        }

        .notfound .home-btn {
            color: rgba(4, 17, 43, 0.92);
            background: #fff;
        }

        .notfound .contact-btn {
            border: 2px solid rgba(255, 255, 255, 0.9);
            color: rgba(255, 255, 255, 0.9);
        }

        .notfound-social {
            margin-top: 25px;
        }

        .notfound-social>a {
            display: inline-block;
            height: 40px;
            line-height: 40px;
            width: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0px 6px;
            -webkit-transition: 0.2s all;
            transition: 0.2s all;
        }

        .notfound-social>a:hover {
            color: rgba(4, 17, 43, 0.92);
            background-color: #fff;
            border-radius: 50%;
        }

        @media only screen and (max-width: 767px) {

            .notfound .notfound-404 h1,
            .notfound .notfound-500 h1 {
                font-size: 182px;
            }
        }

        @media only screen and (max-width: 480px) {

            .notfound .notfound-404,
            .notfound .notfound-500 {
                height: 146px;
            }

            .notfound .notfound-404 h1,
            .notfound .notfound-500 h1 {
                font-size: 146px;
            }

            .notfound h2 {
                font-size: 16px;
            }
        }
    </style>

</head>

<body>
    {% block body %}
    {% endblock %}
    <!-- jquery global -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- carga de pagina -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script>
        NProgress.start();
        window.addEventListener('load', () => NProgress.done());
    </script>
</body>

</html>
